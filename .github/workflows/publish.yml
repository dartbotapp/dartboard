name: Publish
on:
  release:
    types: [published]
permissions:
  contents: read
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm test
      - run: npm run storybook:build

  publish-storybook:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run storybook:build
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE }}
          role-session-name: session-deploy-segment
          aws-region: ${{ secrets.AWS_REGION }}
      - name: Sts GetCallerIdentity
        run: aws sts get-caller-identity
      - name: Deploy static site to S3 bucket
        run: aws s3 cp ./storybook-static/ s3://${{secrets.AWS_DOCS_BUCKET}}/dartboard --recursive

  publish-npm:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm i -g npm@11.5.1
      - run: npm --version
      - run: npm ci
      - name: Ensure no token auth is configured
        run: |
          npm config delete //registry.npmjs.org/:_authToken || true
          unset NODE_AUTH_TOKEN NPM_TOKEN
      - name: Publish to npm
        env:
          IS_PRERELEASE: ${{ github.event.release.prerelease }}
        run: |
          if [[ "$IS_PRERELEASE" == "true" ]]; then
            echo "Publishing prerelease to npm with dist-tag next"
            npm publish --access public --provenance --tag next
          else
            echo "Publishing release to npm with dist-tag latest"
            npm publish --access public --provenance
          fi