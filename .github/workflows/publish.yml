name: Publish
on:
  release:
    types: [published]
permissions:
  contents: read
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm test
      - run: npm run storybook:build

  publish-storybook:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run storybook:build
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE }}
          role-session-name: session-deploy-segment
          aws-region: ${{ secrets.AWS_REGION }}
      - name: Sts GetCallerIdentity
        run: aws sts get-caller-identity
      - name: Deploy static site to S3 bucket
        env:
          IS_PRERELEASE: ${{ github.event.release.prerelease }}
        run: |
          if [[ "$IS_PRERELEASE" == "true" ]]; then
            echo "Deploying prerelease docs to /test/dartboard"
            aws s3 cp ./storybook-static/ s3://${{secrets.AWS_DOCS_BUCKET}}/test/dartboard --recursive
          else
            echo "Deploying release docs to /dartboard"
            aws s3 cp ./storybook-static/ s3://${{secrets.AWS_DOCS_BUCKET}}/dartboard --recursive
          fi

  publish-npm:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - name: Set package version from release tag
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: |
          VERSION="${TAG#v}"
          if [[ -z "$VERSION" || ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid release tag '$TAG'. Expected semver tag like v1.2.3 or v1.2.3-alpha.1"
            exit 1
          fi
          echo "Using version: $VERSION from tag: $TAG"
          npm version "$VERSION" --no-git-tag-version
      - name: Ensure no token auth is configured
        run: |
          npm config delete //registry.npmjs.org/:_authToken || true
          unset NODE_AUTH_TOKEN NPM_TOKEN
      - name: Publish to npm
        env:
          IS_PRERELEASE: ${{ github.event.release.prerelease }}
        run: |
          if [[ "$IS_PRERELEASE" == "true" ]]; then
            echo "Publishing prerelease to npm with dist-tag next"
            npm publish --access public --provenance --tag next
          else
            echo "Publishing release to npm with dist-tag latest"
            npm publish --access public --provenance
          fi