name: Publish
on:
  release:
    types: [published]
concurrency:
  group: publish-release
  cancel-in-progress: false
permissions:
  contents: read
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run storybook:build
      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-artifact
          path: dist
          if-no-files-found: error
      - name: Upload storybook artifact
        uses: actions/upload-artifact@v4
        with:
          name: storybook-artifact
          path: storybook-static
          if-no-files-found: error
  publish-npm:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: dist-artifact
          path: dist
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - run: npm i -g npm@11.5.1
      - name: Set package version from release tag
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: |
          VERSION="${TAG#v}"
          echo "Using version: $VERSION from tag: $TAG"
          npm version "$VERSION" --no-git-tag-version --allow-same-version
      - name: Ensure no token auth is configured
        run: |
          npm config delete //registry.npmjs.org/:_authToken || true
      - name: Publish to npm
        env:
          IS_PRERELEASE: ${{ github.event.release.prerelease }}
        run: |
          if [[ "$IS_PRERELEASE" == "true" ]]; then
            echo "Publishing prerelease to npm with dist-tag next"
            npm publish --ignore-scripts --access public --provenance --tag next
          else
            echo "Publishing release to npm with dist-tag latest"
            npm publish --ignore-scripts --access public --provenance
          fi
  publish-storybook:
    needs: publish-npm
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: storybook-artifact
          path: storybook-static
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE }}
          role-session-name: session-deploy-segment
          aws-region: ${{ secrets.AWS_REGION }}
      - name: Sts GetCallerIdentity
        run: aws sts get-caller-identity
      - name: Deploy static site to S3 bucket
        env:
          IS_PRERELEASE: ${{ github.event.release.prerelease }}
        run: |
          if [[ "$IS_PRERELEASE" == "true" ]]; then
            echo "Deploying prerelease docs to /test/dartboard"
            aws s3 cp ./storybook-static/ s3://${{secrets.AWS_DOCS_BUCKET}}/test/dartboard --recursive
          else
            echo "Deploying release docs to /dartboard"
            aws s3 cp ./storybook-static/ s3://${{secrets.AWS_DOCS_BUCKET}}/dartboard --recursive
          fi
